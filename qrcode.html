<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCARS EMERGENCY QR GENERATOR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;700&display=swap" rel="stylesheet">
    <!-- QRCode.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* RESET & GLOBAL STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Antonio', 'Oswald', sans-serif;
            text-transform: uppercase;
        }

        body {
            background-color: #000000;
            color: #FFCC00;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* LCARS COLOR PALETTE */
        .gold { background-color: #FF9900; }
        .blue { background-color: #99CCFF; }
        .violet { background-color: #CC99CC; }
        .orange { background-color: #FFCC00; }
        .red { background-color: #CC0000; }
        .bg-gold { background: #FF9900 !important; }
        .bg-blue { background: #99CCFF !important; }
        .bg-red { background: #CC0000 !important; }

        /* MAIN CONTAINER LAYOUT */
        .lcars-app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 10px;
        }

        /* HEADER & TOP BAR */
        .lcars-header {
            display: flex;
            height: 60px;
        }

        .lcars-elbow-top-left {
            width: 150px;
            height: 60px;
            background-color: #99CCFF;
            border-radius: 60px 0 0 0;
            position: relative;
            margin-right: 10px;
        }

        .lcars-elbow-top-left::after {
            content: '';
            position: absolute;
            bottom: -1px;
            right: -1px;
            width: 60px;
            height: 40px;
            background-color: #000;
            border-radius: 40px 0 0 0;
        }

        .lcars-top-bar {
            flex-grow: 1;
            background-color: #99CCFF;
            height: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: #000;
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .lcars-stardate {
            font-size: 0.9rem;
        }

        /* MAIN LAYOUT */
        .lcars-main {
            display: flex;
            flex-grow: 1;
            margin-top: 10px;
        }

        /* SIDEBAR NAVIGATION */
        .lcars-sidebar {
            width: 150px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-right: 10px;
        }

        .lcars-sidebar .lcars-bar {
            height: 40px;
            flex-shrink: 0;
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            padding-right: 10px;
            padding-bottom: 5px;
            color: #000;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .lcars-sidebar .lcars-bar:nth-child(2) { height: 80px; }

        .lcars-elbow-bottom-left {
            flex-grow: 1;
            background-color: #CC99CC;
            border-radius: 0 0 0 60px;
            position: relative;
        }

        .lcars-sidebar-graph {
            position: absolute;
            top: 50px;
            bottom: 50px;
            left: 15px;
            right: 45px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border: 1px solid rgba(153, 204, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
        }

        .scan-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(153, 204, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(153, 204, 255, 0.1) 1px, transparent 1px);
            background-size: 10px 10px;
        }

        .data-stream {
            display: flex;
            gap: 5px;
            height: 10px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .data-block {
            flex: 1;
            animation: data-blink 1s steps(2) infinite;
        }

        .freq-analyzer {
            flex-grow: 1;
            display: flex;
            align-items: flex-end;
            gap: 3px;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .freq-bar {
            flex: 1;
            height: var(--h);
            animation: freq-shift 2.5s infinite ease-in-out;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            z-index: 1;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background-color: #CC0000;
            border-radius: 50%;
            animation: red-pulse 0.8s infinite alternate;
        }

        .pulse-text {
            font-size: 0.6rem;
            color: #99CCFF;
            letter-spacing: 1px;
        }

        @keyframes data-blink {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }

        @keyframes freq-shift {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.3); }
        }

        @keyframes red-pulse {
            from { box-shadow: 0 0 2px #CC0000; }
            to { box-shadow: 0 0 8px #FF0000; }
        }

        .lcars-red { background-color: #CC0000 !important; }
        .lcars-violet { background-color: #CC99CC !important; }
        .lcars-orange { background-color: #FFCC00 !important; }
        .lcars-gold { background-color: #FF9900 !important; }
        .lcars-blue { background-color: #99CCFF !important; }

        .lcars-elbow-bottom-left::after {
            content: '';
            position: absolute;
            top: -1px;
            right: -1px;
            width: 60px;
            height: 40px;
            background-color: #000;
            border-radius: 0 0 0 40px;
        }

        /* CONTENT AREA */
        .lcars-content {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 20px;
            padding: 10px;
        }

        .lcars-panel {
            border: 3px solid #FF9900;
            padding: 20px;
            border-radius: 15px;
            background-color: rgba(20, 20, 20, 0.8);
            display: flex;
            flex-direction: column;
        }

        .panel-output { border-color: #99CCFF; }

        .lcars-panel-title {
            color: #FF9900;
            font-size: 1.5rem;
            margin-bottom: 20px;
            border-bottom: 2px solid;
            padding-bottom: 5px;
        }

        .panel-output .lcars-panel-title { color: #99CCFF; }

        /* FORM STYLES */
        .lcars-form .input-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-row .input-group { flex: 1; }

        .lcars-form label {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 5px;
            color: #CC99CC;
        }

        .lcars-form input, .lcars-form textarea {
            background: #000;
            border: 2px solid #FF9900;
            color: #FFF;
            padding: 10px;
            font-size: 1.1rem;
            border-radius: 5px;
            text-transform: uppercase;
        }

        .lcars-form input:focus {
            border-color: #FFCC00;
            outline: none;
            box-shadow: 0 0 10px #FFCC00;
        }

        /* BUTTONS */
        .button-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .lcars-btn {
            flex: 1;
            height: 50px;
            border: none;
            border-radius: 0 25px 25px 0;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: filter 0.2s, transform 0.1s;
        }

        .lcars-btn:hover { filter: brightness(1.2); }
        .lcars-btn:active { transform: scale(0.98); }

        /* QR CODE WRAPPER */
        #qrcode-wrapper {
            position: relative;
            width: 256px;
            height: 256px;
            margin: 0 auto;
        }

        #qrcode-container {
            background-color: #EEE;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 10px solid #99CCFF;
            position: relative;
            width: 100%;
            height: 100%;
        }

        .qr-icon-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65px;
            height: 65px;
            background: #FFF;
            padding: 2px;
            border-radius: 8px;
            z-index: 10;
            display: none;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            border: 2px solid #000;
        }

        #qr-custom-icon { width: 100%; height: 100%; object-fit: contain; }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(153, 204, 255, 0.5);
            display: none;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .status-display { margin-top: 20px; text-align: center; }

        .binary-scroller {
            font-size: 0.8rem;
            color: #99CCFF;
            overflow: hidden;
            white-space: nowrap;
            height: 1.2rem;
            margin-bottom: 5px;
        }

        .status-msg { color: #FFCC00; font-size: 1.2rem; margin-bottom: 20px; }

        .wave-container {
            width: 100%;
            height: 280px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(153, 204, 255, 0.2);
            border-radius: 5px;
            position: relative;
            overflow: hidden;
            margin-top: 70px;
            padding: 5px;
        }

        #wave-canvas { width: 100%; height: 100%; display: block; }

        .wave-overlay-text {
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 0.6rem;
            color: #99CCFF;
            pointer-events: none;
        }

        .lcars-footer { height: 30px; margin-top: 10px; }

        .lcars-bar-bottom {
            background-color: #CC99CC;
            height: 20px;
            border-radius: 0 0 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-size: 0.8rem;
        }

        /* MOBILE OVERRIDES (PADD MODE) */
        @media screen and (max-width: 768px) {
            .lcars-app-container { height: auto; overflow-y: auto; }
            .lcars-header { flex-direction: column; height: auto; }
            .lcars-elbow-top-left { width: 100%; height: 60px; border-radius: 25px 25px 0 0; margin-right: 0; }
            .lcars-elbow-top-left::after { display: none; }
            .lcars-top-bar { flex-direction: column; height: auto; padding: 10px; text-align: center; border-radius: 0 0 10px 10px; }
            .lcars-main { flex-direction: column; }
            .lcars-sidebar {
                width: 100%;
                flex-direction: row;
                height: auto;
                overflow-x: auto;
                padding: 10px 5px;
                margin-right: 0;
                margin-bottom: 15px;
                background: rgba(30, 30, 30, 0.5);
                border-radius: 10px;
                gap: 8px;
            }
            .lcars-sidebar .lcars-bar { width: 100px; height: 40px !important; flex-shrink: 0; font-size: 0.7rem; border-radius: 10px; }
            .lcars-elbow-bottom-left { display: none; }
            .lcars-content { grid-template-columns: 1fr; gap: 20px; }
            .lcars-panel { width: 100%; margin-bottom: 20px; }
            .input-row { flex-direction: column; gap: 0; }
            #qrcode-wrapper { width: 220px; height: 220px; }
            .wave-container { height: 140px; margin-top: 20px; }
            .lcars-footer { display: none; }
        }

        /* PRINT STYLES */
        @media print {
            body { background-color: #fff; color: #000; }
            .lcars-header, .lcars-sidebar, .lcars-footer, .panel-data, .lcars-panel-title, .status-display, .wave-container {
                display: none !important;
            }
            .lcars-main, .lcars-content { display: block; margin: 0; padding: 0; }
            .panel-output { border: 4px solid #000; padding: 40px; background: none; }
            #qrcode-container { border: 2px solid #000; margin: 20px auto; padding: 20px; }
            #qrcode-wrapper { width: 300px; height: 300px; }
            .qr-icon-overlay { display: block !important; width: 70px; height: 70px; border: 3px solid #000; }
            .panel-output::before {
                content: "LCARS EMERGENCY QR SEQUENCE: " attr(data-owner);
                display: block;
                margin-bottom: 20px;
                font-weight: bold;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body class="lcars-bg">
    <div class="lcars-app-container">
        <header class="lcars-header">
            <div class="lcars-elbow-top-left"></div>
            <div class="lcars-top-bar">
                <div class="lcars-title">LCARS EMERGENCY QR // SYSTEM 47</div>
                <div class="lcars-stardate">STARDATE: <span id="stardate"></span></div>
            </div>
        </header>

        <main class="lcars-main">
            <nav class="lcars-sidebar">
                <div class="lcars-bar gold"><span>02-837</span></div>
                <div class="lcars-bar blue"><span>47-921</span></div>
                <div class="lcars-bar red"><span>EMER-SIG</span></div>
                <div class="lcars-bar violet"><span>SEC-01</span></div>
                <div class="lcars-bar orange"><span>33-12</span></div>
                <div class="lcars-elbow-bottom-left">
                    <div class="lcars-sidebar-graph">
                        <div class="scan-grid"></div>
                        <div class="data-stream">
                            <div class="data-block lcars-gold"></div>
                            <div class="data-block lcars-blue"></div>
                            <div class="data-block lcars-red"></div>
                            <div class="data-block lcars-orange"></div>
                            <div class="data-block lcars-violet"></div>
                        </div>
                        <div class="freq-analyzer">
                            <div class="freq-bar lcars-blue" style="--h: 40%"></div>
                            <div class="freq-bar lcars-gold" style="--h: 70%"></div>
                            <div class="freq-bar lcars-red" style="--h: 50%"></div>
                            <div class="freq-bar lcars-orange" style="--h: 90%"></div>
                            <div class="freq-bar lcars-violet" style="--h: 30%"></div>
                        </div>
                        <div class="status-indicator">
                            <div class="pulse-dot"></div>
                            <span class="pulse-text">ACTIVE SCAN</span>
                        </div>
                    </div>
                </div>
            </nav>

            <section class="lcars-content">
                <div class="lcars-panel panel-data">
                    <h2 class="lcars-panel-title">INPUT DATA SEQUENCE</h2>
                    <form id="qr-form" class="lcars-form">
                        <div class="input-group">
                            <label>FULL NAME</label>
                            <input type="text" id="name" placeholder="SURNAME, NAME" required>
                        </div>
                        <div class="input-group">
                            <label>COMM FREQUENCY (PHONE)</label>
                            <input type="tel" id="phone" placeholder="+00 000 0000000" required>
                        </div>
                        <div class="input-group">
                            <label>SUBSP_ADDRESS (EMAIL)</label>
                            <input type="email" id="email" placeholder="USER@FEDERATION.SOL" required>
                        </div>
                        <div class="input-group">
                            <label>STREET ADDRESS</label>
                            <input type="text" id="address" placeholder="123 MAIN ST / DECK 7" required>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label>CITY / SECTOR</label>
                                <input type="text" id="city" placeholder="SAN FRANCISCO" required>
                            </div>
                            <div class="input-group">
                                <label>P_CODE (CAP)</label>
                                <input type="text" id="zip" placeholder="00000" pattern="[0-9]{5}" required>
                            </div>
                        </div>
                        <div class="input-row">
                            <div class="input-group">
                                <label>PROVINCE</label>
                                <input type="text" id="province" placeholder="SF" required>
                            </div>
                            <div class="input-group">
                                <label>STATE</label>
                                <input type="text" id="state" placeholder="UNITED EARTH" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>EMERGENCY NOTE</label>
                            <textarea id="note" rows="3" placeholder="MEDICAL INFO"></textarea>
                        </div>
                        <div class="button-container">
                            <button type="button" id="generate-btn" class="lcars-btn bg-gold">GENERATE QR</button>
                            <button type="button" id="print-btn" class="lcars-btn bg-blue" disabled>PRINT</button>
                        </div>
                    </form>
                </div>

                <div class="lcars-panel panel-output">
                    <h2 class="lcars-panel-title">QR OUTPUT BUFFER</h2>
                    <div id="qrcode-wrapper">
                        <div id="qrcode-container">
                            <div id="qrcode"></div>
                            <div class="scan-line"></div>
                            <div class="qr-icon-overlay">
                                <img src="icon_bag.png" alt="Luggage" id="qr-custom-icon">
                            </div>
                        </div>
                    </div>
                    <div class="status-display">
                        <div class="binary-scroller" id="binary-scroller"></div>
                        <div class="status-msg" id="status-msg">SYSTEM READY...</div>
                        <div class="wave-container">
                            <canvas id="wave-canvas"></canvas>
                            <div class="wave-overlay-text">BIO-SCAN DATA: ACTIVE</div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const generateBtn = document.getElementById('generate-btn');
            const printBtn = document.getElementById('print-btn');
            const qrForm = document.getElementById('qr-form');
            const qrCodeOutput = document.getElementById('qrcode');
            const stardateEl = document.getElementById('stardate');
            const statusMsg = document.getElementById('status-msg');
            const binaryScroller = document.getElementById('binary-scroller');
            const soundFeedback = new (window.AudioContext || window.webkitAudioContext)();

            function updateStardate() {
                const now = new Date();
                const stardate = (now.getFullYear() - 2323) * 1000 + Math.floor(now.getMonth() * 83.33);
                stardateEl.innerText = `${stardate}.${Math.floor(now.getDate() * 0.3)}`;
            }
            setInterval(updateStardate, 1000); updateStardate();

            function updateBinary() {
                let binaryStr = "";
                for (let i = 0; i < 40; i++) binaryStr += Math.random() > 0.5 ? "1 " : "0 ";
                binaryScroller.innerText = binaryStr;
            }
            setInterval(updateBinary, 100);

            const waveCanvas = document.getElementById('wave-canvas');
            const ctx = waveCanvas.getContext('2d');
            let offset = 0;

            function drawWave() {
                const rect = waveCanvas.getBoundingClientRect();
                if (waveCanvas.width !== rect.width) { waveCanvas.width = rect.width; waveCanvas.height = rect.height; }
                ctx.clearRect(0, 0, waveCanvas.width, waveCanvas.height);
                
                const drawLayer = (color, amp, freq, spd, dash = []) => {
                    ctx.beginPath(); ctx.strokeStyle = color; ctx.setLineDash(dash); ctx.lineWidth = 2;
                    for (let x = 0; x < waveCanvas.width; x++) {
                        const y = waveCanvas.height/2 + Math.sin(x*freq + offset*spd)*amp;
                        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                };
                drawLayer('#99CCFF', 60, 0.012, 0.05);
                drawLayer('#FF9900', 40, 0.02, -0.03, [10, 5]);
                drawLayer('#CC99CC', 45, 0.008, 0.02);
                offset += 0.5; requestAnimationFrame(drawWave);
            }
            drawWave();

            function playBeep(type) {
                const osc = soundFeedback.createOscillator();
                const gain = soundFeedback.createGain();
                osc.connect(gain); gain.connect(soundFeedback.destination);
                if (type === 'error') { osc.frequency.setValueAtTime(150, soundFeedback.currentTime); osc.start(); osc.stop(soundFeedback.currentTime + 0.3); }
                else { osc.frequency.setValueAtTime(440, soundFeedback.currentTime); osc.start(); osc.stop(soundFeedback.currentTime + 0.1); }
            }

            generateBtn.addEventListener('click', () => {
                if (!qrForm.checkValidity()) { playBeep('error'); qrForm.reportValidity(); return; }
                playBeep('normal');
                const name = document.getElementById('name').value;
                const vCard = `BEGIN:VCARD\nVERSION:3.0\nFN:${name}\nTEL:${document.getElementById('phone').value}\nEMAIL:${document.getElementById('email').value}\nADR:;;${document.getElementById('address').value};${document.getElementById('city').value};${document.getElementById('province').value};${document.getElementById('zip').value};${document.getElementById('state').value}\nEND:VCARD`;
                
                qrCodeOutput.innerHTML = "";
                statusMsg.innerText = "ENCRYPTING...";
                document.querySelector('.scan-line').style.display = 'block';
                document.querySelector('.qr-icon-overlay').style.display = 'none';

                setTimeout(() => {
                    new QRCode(qrCodeOutput, { text: vCard, width: 256, height: 256, correctLevel: QRCode.CorrectLevel.H });
                    statusMsg.innerText = "BUFFER LOADED.";
                    printBtn.disabled = false;
                    document.querySelector('.qr-icon-overlay').style.display = 'block';
                    document.querySelector('.panel-output').setAttribute('data-owner', name);
                }, 1000);
            });

            printBtn.addEventListener('click', () => window.print());
        });
    </script>
</body>
</html>
